<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OkObserver</title>
  <link rel="icon" href="./favicon.ico" />
  <style>
    :root {
      --brand: #1e63ff;
      --text: #111;
      --bg: #fff;
      --border: #ddd;
      --meta: #666;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
    }

    header h1 {
      margin: 0;
      font-size: 1.3rem;
      color: var(--brand);
    }

    nav {
      display: flex;
      gap: 1rem;
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }

    nav a:hover {
      color: var(--brand);
    }

    main#app {
      max-width: 1300px;
      margin: 0 auto;
      padding: 1rem;
    }

    /* 4-column responsive grid */
    .ok-grid {
      display: grid;
      gap: 1.2rem;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    }

    .ok-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
    }

    .ok-card img.ok-thumb {
      width: 100%;
      height: auto;
      display: block;
      border-bottom: 1px solid var(--border);
    }

    .ok-body {
      padding: 0.6rem 0.8rem 0.9rem;
    }

    .ok-title {
      margin: 0 0 0.3rem;
      font-size: 1.05rem;
      line-height: 1.3;
    }

    .ok-meta {
      color: var(--meta);
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
    }

    .ok-excerpt {
      font-size: 0.9rem;
      color: #222;
      margin: 0;
    }

    .sentinel {
      height: 2px;
      margin-top: 20px;
    }

    /* Back to Posts button */
    .oko-btn-back {
      display: inline-block;
      background: var(--brand);
      color: #fff;
      padding: 0.5rem 0.9rem;
      border: none;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .oko-btn-back:hover {
      filter: brightness(1.1);
    }

    /* ----- hard reset for blue-box title (Option A) ----- */
    .post-detail .post-header h1.post-title,
    .post-detail .post-header .post-title,
    .post-detail h1.post-title {
      background: transparent !important;
      background-image: none !important;
      border: 0 !important;
      box-shadow: none !important;
      outline: 0 !important;
      padding: 0 !important;
      margin: .6rem 0 .2rem 0 !important;
      color: #111 !important;
    }
    .post-detail .post-header h1.post-title::before,
    .post-detail .post-header h1.post-title::after,
    .post-detail .post-header .post-title::before,
    .post-detail .post-header .post-title::after {
      content: none !important;
      display: none !important;
      background: none !important;
      border: 0 !important;
      box-shadow: none !important;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">
      <h1>OkObserver</h1>
      <div class="motto" style="font-size:0.8rem;color:#666;">To comfort the afflicted and afflict the comfortable</div>
    </div>
    <nav>
      <a href="#/">Posts</a>
      <a href="#/about">About</a>
    </nav>
  </header>

  <main id="app">Loading…</main>

  <script type="module" src="./main.js"></script>
</body>
</html>
