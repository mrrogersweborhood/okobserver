<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OkObserver</title>

  <meta name="theme-color" content="#1E66FF" />
  <meta name="description" content="The Oklahoma Observer — To comfort the afflicted and afflict the comfortable." />

  <link rel="icon" href="./favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;800&display=swap" rel="stylesheet" />

  <style>
    :root{
      --brand:#1e66ff;
      --text:#111;
      --muted:#6b7280;
      --card:#ffffff;
      --bg:#f6f7fb;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font:16px/1.45 "Source Sans 3",system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    a{color:var(--brand);text-decoration:none}
    a:hover{text-decoration:underline}

    /* Header */
    .site-header{position:sticky;top:0;z-index:50;background:#1456e3;color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .site-bar{max-width:1100px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;gap:16px}
    .logo-wrap{display:flex;align-items:center;gap:12px}
    .logo-text{font-weight:800;font-size:26px;letter-spacing:.3px}
    .motto{font-size:12px;opacity:.95;margin-top:2px}
    .spacer{flex:1}
    nav a{color:#fff;margin-left:14px;font-weight:600}
    .hamburger{width:38px;height:38px;border-radius:10px;border:1px solid rgba(255,255,255,.25);display:grid;place-items:center;cursor:pointer;background:rgba(255,255,255,.06)}
    .hamburger span{display:block;width:18px;height:2px;background:#fff;position:relative}
    .hamburger span::before,.hamburger span::after{content:"";position:absolute;left:0;width:18px;height:2px;background:#fff}
    .hamburger span::before{top:-6px}.hamburger span::after{top:6px}

    /* Layout */
    .wrap{max-width:1100px;margin:24px auto;padding:0 16px}
    .card{background:var(--card);border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}

    /* Home grid */
    .grid{display:grid;gap:16px}
    @media(min-width:480px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr)}}
    .post{overflow:hidden}
    .thumb{aspect-ratio:3/2;object-fit:cover;width:100%;display:block;border-bottom:1px solid #eee;cursor:pointer}
    .post-body{padding:12px}
    .title{font-weight:800;font-size:16px;margin:0 0 6px;display:inline-block}
    .meta{color:var(--muted);font-size:13px;margin-bottom:6px}
    .excerpt{color:#374151;font-size:14px}

    /* Detail */
    .detail{padding:0}
    .detail-head{padding:16px 16px 0}
    .back-row{padding:12px 16px 0;margin-top:8px}
    .btn{display:inline-flex;align-items:center;gap:8px;background:#eef2ff;color:#1d4ed8;border:1px solid #c7d2fe;padding:9px 12px;border-radius:10px;font-weight:700}
    .btn:hover{text-decoration:none;background:#e0e7ff}
    .detail-title{
      margin:16px 0 6px; font-size:28px; font-weight:900; color:var(--text);
      background:transparent !important; border:none !important; box-shadow:none !important; padding:0 !important;
    }
    .detail-meta{color:var(--muted);font-size:14px;margin:0 0 12px}
    .detail-hero{width:100%;display:block;border-radius:14px}
    .detail-content{padding:16px 16px 24px;font-size:18px;line-height:1.6}
    .detail-content img{max-width:100%;height:auto;border-radius:10px}
    .video-embed{position:relative;background:#000;border-radius:12px;overflow:hidden}
    .video-embed iframe{width:100%;height:420px;border:0;display:block}
    @media(min-width:900px){.video-embed iframe{height:500px}}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-bar">
      <div class="logo-wrap">
        <div class="logo-text">OkObserver</div>
        <div class="motto">“To comfort the afflicted and afflict the comfortable.”</div>
      </div>
      <div class="spacer"></div>
      <nav class="hide-on-mobile">
        <a href="#/">Posts</a>
        <a href="#/about">About</a>
      </nav>
      <div class="hamburger" id="menuBtn" aria-label="Menu"><span></span></div>
    </div>
  </header>

  <main class="wrap">
    <div id="app" class="card">Loading…</div>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
