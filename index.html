<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OkObserver App</title>

  <!-- Favicon (working) -->
  <link rel="icon" href="https://okobserver.org/wp-content/uploads/2020/10/favicon.ico" />

  <style>
    :root{
      --brand:#198cf0;          /* header blue */
      --brand-ink:#ffffff;      /* header text */
      --ink:#1f2937;            /* body text */
      --card:#ffffff;
      --bg:#f4f6f8;
      --shadow:0 2px 8px rgba(0,0,0,.06);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";
      color:var(--ink);
      background:var(--bg);
    }

    /* ===== App shell ===== */
    .site{
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    /* ===== Header ===== */
    .header{
      background:var(--brand);
      color:var(--brand-ink);
      box-shadow:var(--shadow);
    }

    /* Top bar: logo + motto */
    .brandbar{
      display:flex;
      align-items:center;
      justify-content:center;    /* logo is centered; change to space-between for left align + actions */
      gap:16px;
      min-height:88px;           /* reserves space so layout doesn’t jump while image loads */
      padding:14px 16px;
    }
    .brandbar .logo{
      display:flex;
      align-items:center;
      justify-content:center;
      height:60px;               /* visual target height for logo image area */
    }
    .brandbar .logo img{
      display:block;
      height:60px;               /* fixed height for consistency */
      width:auto;
      max-width:100%;
      object-fit:contain;
      image-rendering:auto;
    }
    /* If logo fails to load, hide the alt text so we don’t get big words in the header */
    .brandbar .logo img:not([src]), 
    .brandbar .logo img[src=""]{
      visibility:hidden;
    }

    .brandbar .motto{
      white-space:nowrap;         /* single line */
      font-weight:600;
      letter-spacing:.1px;
      font-size:15px;
      opacity:.95;
      text-align:center;
    }

    /* Nav bar */
    .nav{
      display:flex;
      gap:24px;
      align-items:center;
      justify-content:center;
      padding:10px 12px;
      border-top:1px solid rgba(255,255,255,.15);
      background:linear-gradient(0deg, rgba(0,0,0,.06), rgba(0,0,0,0));
    }
    .nav a{
      color:var(--brand-ink);
      text-decoration:none;
      font-weight:700;
      padding:6px 10px;
      border-radius:8px;
      transition:background .15s ease;
    }
    .nav a:hover,
    .nav a:focus-visible{
      background:rgba(255,255,255,.14);
      outline:none;
    }

    /* ===== Main area ===== */
    main{
      width:100%;
      max-width:1100px;
      margin:18px auto 48px;
      padding:0 16px 24px;
    }

    /* App “mount” nodes (router will inject into these) */
    #app-root{min-height:40vh}
    .hidden{display:none !important}

    /* Basic card look (unchanged semantics) */
    .card{
      background:var(--card);
      border-radius:12px;
      box-shadow:var(--shadow);
    }

    /* Utility link color for titles (keeps your blue) */
    a.title-link{
      color:#1e66ff;
      text-decoration:none;
    }
    a.title-link:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="site">
    <header class="header" role="banner">
      <div class="brandbar">
        <div class="logo" aria-label="The Oklahoma Observer">
          <!-- Use a working absolute URL to avoid 404 and header collapse -->
          <img
            src="https://okobserver.org/wp-content/uploads/2020/10/ObserverLogo.png"
            alt="The Oklahoma Observer"
            width="360"
            height="60"
            decoding="async"
            fetchpriority="high"
          />
        </div>
        <div class="motto">To Comfort The Afflicted And Afflict The Comfortable</div>
      </div>

      <nav class="nav" aria-label="Primary">
        <a href="#/" data-link>Posts</a>
        <a href="#/about" data-link>About</a>
      </nav>
    </header>

    <main id="app-root" role="main">
      <!-- The router will render into here -->
      <noscript>This app requires JavaScript.</noscript>
    </main>

    <footer style="text-align:center;color:#607085;margin:24px 0 40px;font-size:13px">
      <span>Unofficial demo client. © 2025 — <span id="app-version">v2.x</span></span>
      &nbsp;•&nbsp;
      <a href="https://okobserver.org" target="_blank" rel="noopener" style="color:#1e66ff;text-decoration:none">okobserver.org</a>
    </footer>
  </div>

  <!-- App entry (your versioned ES module). Keep your current file name/version. -->
  <script type="module" src="./main.js?v=2.5.7"></script>
</body>
</html>
