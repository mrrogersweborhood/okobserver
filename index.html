<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OkObserver</title>
  <link rel="icon" href="icon.png" />

  <style>
    :root {
      --brand: #1E90FF;
      --bg: #f7f9fc;
      --card: #fff;
      --border: #ddd;
      --text: #000;
    }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      background: var(--brand);
      color: #fff;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header img.logo {
      height: 40px;
    }
    nav a {
      color: #fff;
      margin-left: 20px;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
    }
    .card h2 {
      font-size: 1.2em;
      margin: 0 0 10px;
      color: var(--brand);
    }
    .card img {
      max-width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .btn {
      display: inline-block;
      background: var(--brand);
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      margin-top: auto;
      text-align: center;
    }
    .btn:hover {
      background: #187bcd;
    }
    footer {
      margin-top: 40px;
      padding: 20px;
      text-align: center;
      background: #eee;
      font-size: 0.9em;
      color: #555;
    }

    /* Video hover cue (detail + summary) */
    img.video-preview,
    .post .hero--clickable {
      cursor: pointer;
      transition: opacity .2s ease-in-out, filter .2s ease-in-out;
    }
    img.video-preview:hover,
    .post .hero--clickable:hover {
      opacity: .88;
    }

    /* Error banner */
    .error-banner {
      background: #fdd;
      color: #900;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #c99;
      border-radius: 6px;
      position: relative;
    }
    .error-banner .close {
      position: absolute;
      right: 10px;
      top: 5px;
      border: none;
      background: transparent;
      font-size: 18px;
      cursor: pointer;
      color: #900;
    }
  </style>
</head>
<body>
  <header>
    <img src="Observer-Logo-2015-08-05.png" alt="Oklahoma Observer" class="logo" />
    <nav>
      <a href="#/">Home</a>
      <a href="#/about">About</a>
    </nav>
  </header>

  <div id="app">
    Loading…
  </div>

  <footer>
    Unofficial demo client. © —
    <a href="https://okobserver.org" target="_blank" rel="noopener">okobserver.org</a>
  </footer>

  <script type="module" src="main.js"></script>
</body>
</html>
