<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Oklahoma Observer</title>

    <link rel="icon" type="image/x-icon" href="./icon.png" />
    <meta name="theme-color" content="#1E90FF" />

    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./app.css" />
    <link rel="stylesheet" href="./detail.css" />

    <meta
      name="description"
      content="The Oklahoma Observer — To Comfort The Afflicted And Afflict The Comfortable."
    />

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
  </head>
  <body>
    <header id="main-header">
      <div class="header-inner">
        <img src="./Observer-logo[1].png" alt="Oklahoma Observer Logo" class="site-logo" />
        <div class="motto">To Comfort The Afflicted And Afflict The Comfortable</div>

        <nav class="nav">
          <a href="#/" class="nav-link">Posts</a>
          <a href="#/about" class="nav-link">About</a>
        </nav>

        <button id="menu-toggle" aria-label="Menu">
          <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </button>
      </div>
    </header>

    <main id="app">
      <div class="loading">Loading…</div>
    </main>

    <footer id="main-footer">
      <p>&copy; <span id="year"></span> The Oklahoma Observer. All Rights Reserved.</p>
    </footer>

    <script type="module" src="./main.js?v=2.6.0"></script>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
      document.getElementById("menu-toggle").addEventListener("click", function () {
        document.querySelector(".nav").classList.toggle("open");
      });
    </script>
  
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(console.warn);
      }
    </script>
    
  </body>
</html>
