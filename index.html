<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OkObserver — Latest News</title>

  <!-- Favicons -->
  <link rel="icon" type="image/png" href="icon.png" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="siteHeader" class="site-header">
    <div class="brand">
      <img
        id="siteLogo"
        src="https://okobserver.org/wp-content/uploads/2015/09/Observer-Logo-2015-08-05.png"
        alt="The Oklahoma Observer"
        width="260"
        height="60"
        style="display:block;height:auto;max-height:60px;width:auto;max-width:260px"
        decoding="async"
        onerror="this.style.display='none';document.getElementById('logoFallback')?.style.display='block';"
      />
      <div id="logoFallback" style="display:none;font-weight:700;color:#fff">The Oklahoma Observer</div>
      <div class="tagline">To Comfort The Afflicted And Afflict The Comfortable</div>
    </div>

    <nav id="menu" class="menu">
      <a href="#/">Posts</a>
      <a href="#/about">About</a>
    </nav>
  </header>

  <main id="app">Loading…</main>

  <footer class="site-footer">
    <div class="footer-inner">
      <small>
        Unofficial demo client. © <span id="year"></span> — <span id="appVersion"></span>
      </small>
      <small><a href="https://okobserver.org" target="_blank" rel="noopener">okobserver.org</a></small>
    </div>
  </footer>

  <!-- Lock API base to Cloudflare Worker before modules load -->
  <script>
    (function(){
      const WORKER_BASE = 'https://okobserver-proxy.bob-b5c.workers.dev/wp/v2';
      try { sessionStorage.setItem('__oko_api_base_lock', WORKER_BASE); } catch {}
      window.OKO_API_BASE = WORKER_BASE;
      window.APP_VERSION = 'v2.4.2';
      document.addEventListener('DOMContentLoaded', function(){
        const y=document.getElementById('year'); if(y) y.textContent=new Date().getFullYear();
        const v=document.getElementById('appVersion'); if(v) v.textContent=window.APP_VERSION;
      });
    })();
  </script>

  <!-- App entry -->
  <script type="module" src="main.js?v=2.4.2" defer></script>
</body>
</html>
