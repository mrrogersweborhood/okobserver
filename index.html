  <!-- ✅ Real favicon -->

  <link rel="stylesheet" href="detail.css?v=2025-10-16i" />
  <link rel="stylesheet" href="override.css?v=2025-10-16i" />

  <!-- 🔒 Inline hard-fix so it always wins even if a stale CSS is cached -->
  <style id="oko-hardfix">
    :where(.post-detail) :where(.post-header) :where(h1.post-title, h1, .post-title){
      background:transparent !important;background-image:none !important;
      box-shadow:none !important;border:0 !important;outline:0 !important;
      padding:0 !important;margin:.6rem 0 .25rem 0 !important;color:#111 !important;
      text-align:left !important;line-height:1.2 !important;font-weight:800 !important;
    }
    :where(.post-detail) :where(.post-header) :where(.post-meta, .byline, .meta, .meta-inline){
      display:block !important;margin:.25rem 0 .9rem 0 !important;
      color:#666 !important;background:transparent !important;padding:0 !important;border:0 !important;
      text-align:left !important;
    }
    :where(.post-detail) :where(.oko-actions-top, .oko-actions-bottom) a,
    :where(.post-detail) :where(.oko-actions-top, .oko-actions-bottom) button,
    :where(.post-detail) .oko-btn-back{
      display:inline-block !important;appearance:button !important;cursor:pointer !important;
      border:0 !important;border-radius:10px !important;padding:10px 14px !important;
      font-weight:600 !important;text-decoration:none !important;
      background:#1e90ff !important;color:#fff !important;box-shadow:0 2px 10px rgba(0,0,0,.08) !important;
    }
    :where(.post-title)[style*="background"]{
      background:transparent !important;background-image:none !important;
    }
  </style>

  <style>
    :root {
      --brand: #1E63FF;
      --light-bg: #f5f7fb;

    body {
      margin: 0;

      background: var(--light-bg);
      color: var(--text-dark);
    }
    header {
      background: var(--brand);
      color: #fff;
      padding: 0.6rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; margin: 0; }
    nav a { color: #fff; text-decoration: none; margin-left: 1.2rem; font-weight: 500; }
    nav a:hover { text-decoration: underline; }
    main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
    footer {
      text-align: center;
      font-size: 0.9rem;
      color: #777;
      padding: 1rem 0;
      border-top: 1px solid var(--border);
      background: #fff;
    }
  </style>
</head>
