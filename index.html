<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Oklahoma Observer</title>
  <link rel="icon" href="./icon.png" />
  <style>
    :root { --brand: #1e90ff; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:#fff; color:#000; }
    header { background: var(--brand); color:#fff; padding: 12px 16px; display:flex; align-items:center; justify-content:space-between; }
    header img { height:40px; }
    nav a { color:#fff; text-decoration:none; margin-left:18px; font-weight:600; }
    nav a:hover { text-decoration: underline; }
    #app { min-height:70vh; padding: 16px; }
    .section-title { font-size: 1.6em; border-bottom: 3px solid var(--brand); display:inline-block; padding-bottom:6px; margin: 0 0 16px 0; }
    .post-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap:16px; }
    .post-card { background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.08); overflow:hidden; }
    .post-card .post-thumb img { width:100%; height: 180px; object-fit: cover; display:block; }
    .post-card .post-title { font-size:1.05em; margin:10px 12px 6px; color:#1155cc; }
    .post-card .post-date { display:block; color:#666; font-size:.85em; margin: 0 12px 12px; }
    .loading { text-align:center; color:#666; }
    footer { text-align:center; font-size:.9em; padding:16px; border-top:1px solid #ddd; color:#555; }
  </style>
</head>
<body>
  <header>
    <img src="./ObserverLogoBlue.png" alt="The Oklahoma Observer" />
    <nav id="nav">
      <a href="#/">Posts</a>
      <a href="#/about">About</a>
    </nav>
  </header>

  <main id="app">Loading...</main>

  <footer>© <span id="year"></span> The Oklahoma Observer. All Rights Reserved.</footer>

  <script type="module" src="./main.js?v=2.6.4"></script>
  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
