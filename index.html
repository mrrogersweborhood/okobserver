<!DOCTYPE html>
<html lang="en">
<head>
<!-- Silence favicon 404 (harmless but noisy) -->
<link rel="icon" href="data:,">

<!-- OkObserver: small, scoped CSS (safe to duplicate) -->
<style id="oko-head-guards">
  /* Force 4-up on wide screens with responsive fallbacks.
     Uses a broad container selector but only affects direct children grids. */
  #app { contain: content; } /* keeps layout effects scoped */
  #app { --oko-gap: 22px; }

  @media (min-width: 1000px){
    #app > * { display: grid !important; grid-template-columns: repeat(4, minmax(0,1fr)) !important; gap: var(--oko-gap) !important; align-items: start !important; }
  }
  @media (max-width: 999px) and (min-width: 641px){
    #app > * { display: grid !important; grid-template-columns: repeat(2, minmax(0,1fr)) !important; gap: var(--oko-gap) !important; align-items: start !important; }
  }
  @media (max-width: 640px){
    #app > * { display: grid !important; grid-template-columns: 1fr !important; gap: var(--oko-gap) !important; align-items: start !important; }
  }

  /* Ensure post titles on detail view never pick up a background box */
  .post-detail .post-header .post-title,
  .post-detail h1.post-title {
    background: transparent !important;
    border: 0 !important;
    box-shadow: none !important;
    padding: 0 !important;
    color: #111 !important;
  }
</style>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OkObserver</title>
  <link rel="stylesheet" href="app.css" />

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #f7f9fc;
    }
    header {
      background: #1e63ff;
      color: #fff;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    nav a {
      color: #fff;
      margin-left: 1rem;
      text-decoration: none;
      font-weight: 600;
    }
    main {
      padding: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    footer {
      text-align: center;
      padding: 1rem;
      color: #555;
      font-size: 0.85rem;
    }
  </style>

  <!-- Permanent Fix for 4-column grid & Title cleanup -->
  <style id="oko-hotfix-v1">
    /* Force 4-up grid with responsive fallbacks */
    #app .posts-grid,
    #app .posts-list,
    #app .posts,
    #app .cards,
    #app .list,
    #app > .grid {
      display: grid !important;
      grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
      gap: 22px !important;
      align-items: start !important;
    }
    @media (max-width: 1200px){
      #app .posts-grid, #app .posts-list, #app .posts, #app .cards, #app .list, #app > .grid {
        grid-template-columns: repeat(3, minmax(0,1fr)) !important;
      }
    }
    @media (max-width: 900px){
      #app .posts-grid, #app .posts-list, #app .posts, #app .cards, #app .list, #app > .grid {
        grid-template-columns: repeat(2, minmax(0,1fr)) !important;
      }
    }
    @media (max-width: 560px){
      #app .posts-grid, #app .posts-list, #app .posts, #app .cards, #app .list, #app > .grid {
        grid-template-columns: 1fr !important;
      }
    }

    /* Card layout sanity */
    .post-card { width: 100% !important; max-width: none !important; }
    .post-card img { width: 100% !important; height: auto !important; display: block; }

    /* Remove any blue box from post titles (detail page) */
    .post-detail .post-header .post-title,
    .post-detail h1.post-title {
      background: transparent !important;
      background-image: none !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: 0 !important;
      margin: .6rem 0 .2rem 0 !important;
      color: #111 !important;
    }
    .post-detail .post-header .post-title::before,
    .post-detail .post-header .post-title::after {
      content: none !important;
      display: none !important;
    }

    /* Author/date display */
    .post-detail .post-meta {
      color: #666;
      font-size: 14px;
      margin: 0 0 .75rem 0;
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>OkObserver</h1>
      <p style="font-size:0.8rem; margin:0;">"To comfort the afflicted and afflict the comfortable."</p>
    </div>
    <nav>
      <a href="#/">Posts</a>
      <a href="#/about">About</a>
    </nav>
  </header>

  <main id="app">
    <!-- Content dynamically injected here -->
  </main>

  <footer>
    © 2025 The Oklahoma Observer • All Rights Reserved.
  </footer>

  <script type="module" src="main.js"></script>

  <!-- Enforce grid and cleanup dynamically -->
  <script>
    (function gridEnforcer(){
      const APP = document.getElementById('app');

      function makeGrid() {
        let container =
          APP.querySelector('.posts-grid') ||
          APP.querySelector('.posts-list') ||
          APP.querySelector('.posts') ||
          APP.querySelector('.cards') ||
          APP.querySelector('.list') ||
          [...APP.children].find(el => el.querySelectorAll('.post-card').length > 1);

        const cards = APP.querySelectorAll('.post-card');
        if (container && cards.length > 1) {
          container.style.setProperty('display', 'grid', 'important');
          container.style.setProperty('gap', '22px', 'important');
          container.style.setProperty('align-items', 'start', 'important');
          container.style.setProperty('grid-template-columns', 'repeat(4, 1fr)', 'important');

          cards.forEach(c => {
            c.style.setProperty('width', '100%', 'important');
            c.style.setProperty('max-width', 'none', 'important');
          });
        }
      }

      function cleanTitles() {
        document.querySelectorAll('.post-detail .post-title').forEach(t => {
          t.style.background = 'transparent';
          t.style.border = 'none';
          t.style.boxShadow = 'none';
        });
      }

      makeGrid();
      cleanTitles();
      new MutationObserver(() => {
        makeGrid();
        cleanTitles();
      }).observe(APP, { childList: true, subtree: true });
      window.addEventListener('hashchange', () => setTimeout(makeGrid, 0));
      document.addEventListener('DOMContentLoaded', makeGrid);
    })();
  </script>
<script id="oko-enforce-grid">
(function enforceFourAcross(){
  const APP = document.getElementById('app');
  if (!APP) return;

  function getCards(root){
    // Common post card shapes; keep broad so theme changes don’t break it
    const candidates = root.querySelectorAll(
      '.post-card, .card, article.post, article, li.post, [data-post-id]'
    );
    // Must contain a link to a detail page
    return [...candidates].filter(el =>
      el.querySelector('a[href*="#/post/"]') || el.querySelector('a[href*="/#/post/"]'));
  }

  function ensureGrid(){
    const cards = getCards(APP);
    if (cards.length < 2) return; // not enough to grid

    // Find a container holding multiple cards
    let container = cards[0].parentElement;
    while (container && container !== APP) {
      if (getCards(container).length > 1) break;
      container = container.parentElement;
    }
    if (!container || container === APP) container = APP;

    // Force grid on that container
    container.style.setProperty('display', 'grid', 'important');
    container.style.setProperty('grid-template-columns', 'repeat(4, minmax(0, 1fr))', 'important');
    container.style.setProperty('gap', '22px', 'important');
    container.style.setProperty('align-items', 'start', 'important');

    // Make each card fit the grid cleanly
    cards.forEach(c => {
      c.style.setProperty('width', '100%', 'important');
      c.style.setProperty('max-width', 'none', 'important');
      c.style.setProperty('display', 'block', 'important');
    });
  }

  function cleanTitleBox(){
    document.querySelectorAll('.post-detail .post-title').forEach(t => {
      t.style.setProperty('background', 'transparent', 'important');
      t.style.setProperty('border', '0', 'important');
      t.style.setProperty('box-shadow', 'none', 'important');
      t.style.setProperty('padding', '0', 'important');
    });
  }

  // Run now and on future DOM changes / route changes
  ensureGrid();
  cleanTitleBox();

  const obs = new MutationObserver(() => { ensureGrid(); cleanTitleBox(); });
  obs.observe(APP, { childList: true, subtree: true });

  window.addEventListener('hashchange', () => setTimeout(() => { ensureGrid(); cleanTitleBox(); }, 0));
  document.addEventListener('DOMContentLoaded', () => { ensureGrid(); cleanTitleBox(); });
})();
</script>

</body>
</html>
