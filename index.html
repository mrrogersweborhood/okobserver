<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>OkObserver — Latest News</title>

<link rel="icon" type="image/png" href="icon.png" />
<link rel="preconnect" href="https://okobserver.org" crossorigin>
<link rel="dns-prefetch" href="//okobserver.org">

<link rel="stylesheet" href="styles.css?v=v2.0.0-mod" />
</head>
<body>
<header>
  <div class="container nav">
    <div class="brand">
      <img id="siteLogo"
        src="https://okobserver.org/wp-content/uploads/2015/09/Observer-Logo-2015-08-05.png"
        alt="The Oklahoma Observer" width="260" height="60"
        style="display:block;height:auto;max-height:60px;width:auto;max-width:260px"
        decoding="async"
        onerror="this.style.display='none';document.getElementById('logoFallback').style.display='block';"/>
      <div id="logoFallback" style="display:none;font-weight:700">The Oklahoma Observer</div>
      <div style="font-size:0.9em;margin-top:6px;">To Comfort The Afflicted And Afflict The Comfortable</div>
    </div>

    <button id="menuToggle" class="hamburger" aria-label="Open menu" aria-controls="primaryNav" aria-expanded="false">
      <span class="hamburger-box"><span class="hamburger-inner"></span></span>
    </button>

    <nav id="primaryNav" class="nav-links" data-state="closed">
      <a href="#/" id="nav-home">Home</a>
      <a href="#/about" id="nav-about">About</a>
    </nav>
  </div>
</header>

<main>
  <div class="container" id="app"><p class="center">Loading…</p></div>
</main>

<footer>
  <div class="container" style="display:flex;gap:10px;align-items:center;justify-content:space-between;padding:16px 18px">
    <small>Unofficial demo client. © <span id="year"></span> — <span id="appVersion"></span></small>
    <small><a href="https://okobserver.org" target="_blank" rel="noopener">okobserver.org</a></small>
  </div>
</footer>

<script type="module" src="core.js?v=v2.0.0-mod"></script>

<script>
(function(){
  const btn = document.getElementById('menuToggle');
  const nav = document.getElementById('primaryNav');
  if (!btn || !nav) return;
  function setOpen(open){
    btn.setAttribute('aria-expanded', String(open));
    nav.dataset.state = open ? 'open' : 'closed';
  }
  btn.addEventListener('click', function(){
    const open = btn.getAttribute('aria-expanded') !== 'true';
    setOpen(open);
  });
  nav.addEventListener('click', function(e){
    if (e.target.tagName === 'A') setOpen(false);
  });
  window.addEventListener('hashchange', function(){ setOpen(false); });
})();
</script>

<script>
window.addEventListener('load', function () {
  setTimeout(function () {
    if (!window.APP_VERSION) {
      var host = document.getElementById('app') || document.body;
      var div = document.createElement('div');
      div.className = 'error-banner';
      div.innerHTML = '<button class="close" aria-label="Dismiss">×</button>' +
        'App script did not execute. Check Network → core.js (200), hard-reload, and confirm modules are loading.';
      host.prepend(div);
    } else {
      var v = document.getElementById('appVersion'); if (v) v.textContent = window.APP_VERSION;
      var y = document.getElementById('year'); if (y) y.textContent = new Date().getFullYear();
    }
  }, 700);
});
document.addEventListener('click', function(e){
  var btn = e.target.closest('.error-banner .close'); if(btn) btn.closest('.error-banner')?.remove();
});
</script>
</body>
</html>
