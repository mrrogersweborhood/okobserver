<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Oklahoma Observer — OkObserver App</title>
  <link rel="icon" type="image/png" href="icon.png" />

  <style>
    :root{
      --brand:#1E90FF;
      --bg:#f6f7fb;
      --text:#111;
      --header-h: 120px;
      --card-border:#ddd;
      --shadow: 0 2px 5px rgba(0,0,0,.06);
      --shadow-hover: 0 4px 10px rgba(0,0,0,.1);
    }

    html{ scroll-padding-top: var(--header-h); }
    *, *::before, *::after{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    /* ===== Header ===== */
    header{
      position:sticky;
      top:0;
      z-index:1000;
      background:var(--brand);
      color:#fff;
      text-align:center;
      padding:1.25rem 0 .75rem;
      box-shadow:0 2px 6px rgba(0,0,0,.08);
    }
    header img{
      display:block;
      margin:0 auto;
      height:64px;
      width:auto;
    }
    header .motto{
      font-size:.9rem;
      font-weight:600;
      letter-spacing:.2px;
      margin-top:.35rem;
      opacity:.95;
      white-space:nowrap;
    }

    /* ===== Navigation ===== */
    nav{
      display:flex;
      justify-content:flex-end;
      gap:1.25rem;
      background:var(--brand);
      padding:0 .75rem 1rem;
    }
    nav a{
      color:#fff;
      font-weight:600;
      text-decoration:none;
    }
    nav a:hover{ text-decoration:underline; }

    /* ===== Main ===== */
    main{
      max-width:1140px;
      margin:1rem auto 2.25rem;
      padding:0 1rem;
    }

    /* ===== Grid ===== */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:1.75rem;
    }

    /* ===== Framed Card (original look) ===== */
    .card{
      background:#fff;
      border:1px solid var(--card-border);
      border-radius:12px;
      box-shadow:var(--shadow);
      overflow:hidden;                 /* <-- prevents bleed */
      transition:transform .2s ease, box-shadow .2s ease;
    }
    .card:hover{
      transform:translateY(-3px);
      box-shadow:var(--shadow-hover);
    }

    /* Safe thumbnail wrapper to prevent overflow */
    .thumb-wrap{
      display:block;
      position:relative;
      width:100%;
      aspect-ratio:16/9;               /* uniform height */
      overflow:hidden;                  /* <-- hard clamp */
      background:#f0f0f0;
    }
    .thumb-wrap img.thumb{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;                 /* fill but contained by wrapper */
      object-position:center center;
    }

    .card-content{
      padding:1.2rem 1.6rem 1.45rem;
      line-height:1.6;
    }

    .card-title{
      color:var(--brand);
      font-weight:800;
      font-size:1.12rem;
      margin:.25rem 0 .45rem;
      line-height:1.25;
      text-decoration:none;
      display:inline-block;
    }
    .card-title:hover{ text-decoration:underline; }

    .meta{
      color:#555;
      font-size:.92rem;
      margin-bottom:.6rem;
    }

    /* Post detail hero / poster */
    .post .poster-shell{
      position:relative;
      overflow:hidden;
      border-radius:12px;
      aspect-ratio:16/9;
      background:#eee;
      margin:1rem auto 1.25rem;
      max-width:min(900px,92vw);
      transition:box-shadow .2s ease;
    }
    .post .poster-shell:hover{ box-shadow:0 0 10px rgba(0,0,0,.15); }
    .post .poster-img{
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:inherit;
      display:block;
      transition:opacity .2s ease;
    }
    .post .poster-shell:hover .poster-img{ opacity:.9; }

    .meta-author-date{
      color:#444;
      margin:0 0 1rem;
      font-size:.95rem;
      line-height:1.45;
    }

    footer{
      text-align:center;
      font-size:.9rem;
      padding:2rem 0 3rem;
      color:#666;
    }

    @media (max-width:560px){
      .card-title{ font-size:1.06rem; }
      .card-content{ padding:1rem 1.4rem 1.2rem; }
      .motto{ font-size:.85rem; }
    }
  </style>
</head>
<body>
  <header>
    <img src="Observer-Logo-2015-08-05.png" alt="Observer logo" />
    <div class="motto">To Comfort The Afflicted And Afflict The Comfortable</div>
  </header>

  <nav>
    <a href="#/">Posts</a>
    <a href="#/about">About</a>
  </nav>

  <main id="app">
    <p>Loading…</p>
  </main>

  <footer>
    Unofficial demo client. © 2025 — v2.7.6<br/>
    <a href="https://okobserver.org" target="_blank" rel="noopener">okobserver.org</a>
  </footer>

  <!-- Your modular entry (do not swap back to app.js) -->
  <script type="module" src="main.js?v=2.7.6"></script>
</body>
</html>
