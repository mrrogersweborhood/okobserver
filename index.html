<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Oklahoma Observer</title>

  <!-- Fallback API base so routes never boot without it -->
  <meta name="oko-api-base" content="https://okobserver-proxy.bob-b5c.workers.dev" />

  <!-- App styles (cache-busted) -->
  <link rel="stylesheet" href="./styles.css?v=265" />

  <!-- Prevent stale cache -->
  <meta http-equiv="Cache-Control" content="no-store" />
</head>
<body>
  <header class="site-header" style="background:#1e63ff;color:white;position:sticky;top:0;z-index:50;">
    <div class="container" style="display:flex;flex-direction:column;align-items:center;padding:0.5rem 1rem;">
      <a class="brand" href="./#/" style="text-decoration:none;color:white;font-family:Georgia,serif;font-size:2rem;font-weight:700;">
        Observer
      </a>
      <div class="motto" style="font-style:italic;font-size:0.9rem;margin-top:0.2rem;">
        “To comfort the afflicted and afflict the comfortable.”
      </div>
      <nav class="nav" style="margin-top:0.5rem;">
        <a href="./#/" style="color:white;text-decoration:none;margin:0 0.75rem;">Posts</a>
        <a href="./#/about" style="color:white;text-decoration:none;margin:0 0.75rem;">About</a>
      </nav>
    </div>
  </header>

  <main id="app">
    <div class="loading" style="text-align:center;padding:2rem;">Loading…</div>
  </main>

  <footer class="site-footer" style="background:#f8f8f8;color:#444;text-align:center;padding:1.5rem 0;margin-top:2rem;">
    © 2025 The Oklahoma Observer. All Rights Reserved.
  </footer>

  <!-- Boot strap: define API base BEFORE any route files load -->
  <script>
    (function () {
      var apiFromWindow = (typeof window !== 'undefined' && window.OKO_API_BASE) ? window.OKO_API_BASE : '';
      var meta = document.querySelector('meta[name="oko-api-base"]');
      var apiFromMeta = meta ? meta.getAttribute('content') : '';
      var apiDefault = 'https://okobserver-proxy.bob-b5c.workers.dev';
      var base = apiFromWindow || apiFromMeta || apiDefault;
      window.OKO_API_BASE = base;
      if (!base) console.error('[OkObserver] No API base resolved at bootstrap.');
    })();
  </script>

  <!-- Core + utilities -->
  <script type="module" src="./core-fixed.js?v=265"></script>
  <script type="module" src="./utils.v263.js?v=265"></script>

  <!-- Main app -->
  <script type="module" src="./main.js?v=265"></script>

  <!-- Lightweight service worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
