<!doctype html>
<html lang="en">
<head>
  <!-- OkObserver · index.html · v2.6.5 (app shell only) -->
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1e88ff" />
  <meta name="color-scheme" content="light dark" />

  <!-- Hard no-cache hint for intermediaries (GitHub Pages still serves static, but helps browsers) -->
  <meta http-equiv="Cache-Control" content="no-store, max-age=0, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Observer</title>
  <meta name="description" content="To comfort the afflicted and afflict the comfortable." />

  <!-- Icons -->
  <link rel="icon" type="image/png" href="./favicon.ico?v=265" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png?v=265" />

  <!-- Styles (cache-busted). Your CSS controls the grid (e.g., 4 columns on desktop). -->
  <link rel="stylesheet" href="./styles.css?v=265">

  <!-- Preload main module to reduce FOUC -->
  <link rel="modulepreload" href="./main.js?v=265">

  <!-- Open Graph / Social -->
  <meta property="og:title" content="Observer" />
  <meta property="og:description" content="To comfort the afflicted and afflict the comfortable." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mrrogersweborhood.github.io/okobserver/" />
</head>
<body>
  <!-- App header is rendered by JS; keep body minimal -->
  <noscript>JavaScript is required to run this site.</noscript>

  <!-- App root (router renders into this) -->
  <div id="app" aria-live="polite"></div>

  <!-- Global portals -->
  <div id="toast" aria-live="assertive" aria-atomic="true"></div>
  <div id="modal-root" aria-hidden="true"></div>

  <!-- Service Worker (tiny: install/activate only). Safe to keep. -->
  <script>
    // sw.js only skips waiting & claims clients; no caching logic to fight our busting.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js?v=265').catch(() => {});
      });
    }
  </script>

  <!-- Main ESM entry (cache-busted). This file imports core-fixed, home/detail chunks, and utils. -->
  <script type="module" src="./main.js?v=265"></script>
</body>
</html>
