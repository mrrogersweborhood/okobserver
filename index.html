<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OkObserver</title>
  <link rel="stylesheet" href="app.css" />
  <style>
    /* Existing styles */
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #f7f9fc;
    }
    header {
      background: #1e63ff;
      color: #fff;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    nav a {
      color: #fff;
      margin-left: 1rem;
      text-decoration: none;
      font-weight: 600;
    }
    main {
      padding: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    footer {
      text-align: center;
      padding: 1rem;
      color: #555;
      font-size: 0.85rem;
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>OkObserver</h1>
      <p style="font-size:0.8rem; margin:0;">"To comfort the afflicted and afflict the comfortable."</p>
    </div>
    <nav>
      <a href="#/">Posts</a>
      <a href="#/about">About</a>
    </nav>
  </header>

  <main id="app">
    <!-- Dynamic content loads here -->
  </main>

  <footer>
    © 2025 The Oklahoma Observer • All Rights Reserved.
  </footer>

  <script type="module" src="main.js"></script>

  <!-- 🧱 Permanent 4-column grid lock -->
  <style id="oko-grid-lock">
    :root body #app .grid,
    :root body main .grid,
    :root body .posts .grid {
      display: grid !important;
      gap: 16px !important;
      grid-auto-rows: auto !important;
      grid-template-columns: repeat(4, 1fr) !important;
    }
    :root body #app .grid > * {
      min-width: 0 !important;
      width: 100% !important;
    }
    @media (max-width: 1100px) {
      :root body #app .grid,
      :root body main .grid,
      :root body .posts .grid {
        grid-template-columns: repeat(3, 1fr) !important;
      }
    }
    @media (max-width: 800px) {
      :root body #app .grid,
      :root body main .grid,
      :root body .posts .grid {
        grid-template-columns: repeat(2, 1fr) !important;
      }
    }
    @media (max-width: 520px) {
      :root body #app .grid,
      :root body main .grid,
      :root body .posts .grid {
        grid-template-columns: 1fr !important;
      }
    }
    :root body #app .grid img {
      max-width: 100% !important;
      height: auto !important;
      display: block !important;
    }
  </style>

  <!-- JS guard to enforce 4-column layout even if scripts modify it -->
  <script>
    (function () {
      const postsGridSel = '#app .grid, main .grid, .posts .grid';
      function enforceGrid() {
        document.querySelectorAll(postsGridSel).forEach(el => {
          el.style.setProperty('display', 'grid', 'important');
          el.style.setProperty('gap', '16px', 'important');
          el.style.setProperty('grid-auto-rows', 'auto', 'important');
          el.style.setProperty('grid-template-columns', 'repeat(4, 1fr)', 'important');
        });
      }
      enforceGrid();
      document.addEventListener('DOMContentLoaded', enforceGrid);
      new MutationObserver(enforceGrid).observe(document.documentElement, { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
