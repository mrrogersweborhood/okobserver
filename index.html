<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Oklahoma Observer</title>
<link rel="icon" href="icon.png" type="image/png" />

<style>
:root {
  --brand: #1e90ff;
  --bg: #f5f7fa;
  --text: #222;
  --card-bg: #fff;
}

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
}

header {
  background: var(--brand);
  color: white;
  text-align: center;
  padding: 1rem 0 0.5rem 0;
  position: sticky;
  top: 0;
  z-index: 10;
}

header img.logo {
  max-width: 280px;
  height: auto;
}

header p.motto {
  font-size: 0.9rem;
  margin: 0.25rem 0 0.5rem 0;
}

nav {
  background: rgba(0, 0, 0, 0.05);
  display: flex;
  justify-content: center;
  gap: 2rem;
  padding: 0.5rem 0;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

nav a:hover {
  text-decoration: underline;
}

main {
  max-width: 1100px;
  margin: 1rem auto 3rem auto;
  padding: 0 1rem;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.5rem;
}

.card {
  background: var(--card-bg);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
  display: flex;
  flex-direction: column;
  border: 1px solid #eee;
}

.card img {
  width: 100%;
  height: auto;
  display: block;
}

.card-content {
  padding: 1rem;
}

.card-content h2 {
  font-size: 1.2rem;
  color: var(--brand);
  margin: 0 0 0.25rem 0;
}

.card-content p.meta {
  color: #555;
  font-size: 0.85rem;
  margin: 0 0 0.75rem 0;
}

.card-content p.excerpt {
  font-size: 0.95rem;
  margin: 0;
}

/* --- Hero media stability (detail page) --- */
.hero {
  max-width: 980px;
  margin: 16px auto 8px auto;
}
.hero-iframe-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
}
.hero-iframe-wrap iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
}
.hero-poster {
  position: relative;
  display: block;
  width: 100%;
  border-radius: 12px;
  overflow: hidden;
  background: #111;
}
.hero-poster img {
  display: block;
  width: 100%;
  height: auto;
  object-fit: cover;
}
.hero-poster .hero-play {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  border-radius: 999px;
  padding: 0.45rem 0.7rem;
  font-size: 1.15rem;
  line-height: 1;
}
.hero-poster:hover {
  filter: brightness(0.92);
  cursor: pointer;
}
.no-video img {
  object-fit: contain;
  background: #f6f6f6;
}

footer {
  text-align: center;
  font-size: 0.8rem;
  color: #666;
  margin: 2rem 0;
}
</style>
</head>

<body>
<header>
  <img src="Observer-Logo-2015-08-05.png" alt="Observer logo" class="logo" />
  <p class="motto">To Comfort The Afflicted And Afflict The Comfortable</p>
  <nav>
    <a href="#/">Posts</a>
    <a href="#/about">About</a>
  </nav>
</header>

<main id="app">
  <p>Loading…</p>
</main>

<footer>
  Unofficial demo client. © 2025 — v2.5.4<br />
  <a href="https://okobserver.org" target="_blank">okobserver.org</a>
</footer>

<!-- JS Modules -->
<script type="module" src="./main.js?v=2.5.4"></script>
</body>
</html>
