<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>OkObserver App</title>

    <!-- Prevent old caches from serving stale JS -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Favicon / Touch Icon (avoid 404s by pointing to a known-good image) -->
    <link
      rel="icon"
      href="https://okobserver.org/wp-content/uploads/2020/10/ObserverLogoBlue.png"
    />
    <link
      rel="apple-touch-icon"
      href="https://okobserver.org/wp-content/uploads/2020/10/ObserverLogoBlue.png"
    />

    <!-- App styles (keep your existing files/paths) -->
    <link rel="stylesheet" href="./styles.css?v=2.5.8" />
    <link rel="stylesheet" href="./app.css?v=2.5.8" />

    <style>
      /* Tiny, safe header helpers (doesn't touch cards, grids, etc.) */
      header.site-header {
        background: #1884e0;
        color: #fff;
      }
      .site-header .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 16px 20px 8px;
      }
      .brand {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: center;
        gap: 14px;
      }
      .brand img.logo {
        height: 56px;
        width: auto;
        display: block;
      }
      .brand .title-wrap {
        line-height: 1.1;
      }
      .brand .motto {
        margin-top: 6px;
        font-size: 14px;
        opacity: 0.95;
        white-space: nowrap;        /* keep on one line as requested */
        overflow: hidden;
        text-overflow: ellipsis;
      }
      nav.primary {
        background: rgba(0, 0, 0, 0.08);
      }
      nav.primary .nav-wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 10px 20px;
        display: flex;
        gap: 18px;
      }
      nav.primary a {
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
      /* Keep main container name EXACTLY "app" so router can mount */
      main#app {
        min-height: 60vh;
      }
      footer.site-footer {
        border-top: 1px solid #e9eef3;
        padding: 28px 20px;
        color: #5b6b7a;
        background: #fff;
      }
      footer .container {
        max-width: 1100px;
        margin: 0 auto;
      }
    </style>
  </head>

  <body>
    <!-- Header -->
    <header class="site-header" role="banner">
      <div class="container">
        <div class="brand" aria-label="The Oklahoma Observer">
          <img
            class="logo"
            src="https://okobserver.org/wp-content/uploads/2020/10/ObserverLogoBlue.png"
            alt="The Oklahoma Observer"
            decoding="async"
            fetchpriority="high"
          />
          <div class="title-wrap">
            <h1 class="sr-only">The Oklahoma Observer</h1>
            <div class="motto">To Comfort The Afflicted And Afflict The Comfortable</div>
          </div>
        </div>
      </div>

      <nav class="primary" aria-label="Primary">
        <div class="nav-wrap">
          <a href="#/">Posts</a>
          <a href="#/about">About</a>
        </div>
      </nav>
    </header>

    <!-- 🔵 IMPORTANT: this id must be exactly "app" (the router looks for it) -->
    <main id="app" role="main" aria-live="polite"></main>

    <!-- Footer -->
    <footer class="site-footer" role="contentinfo">
      <div class="container">
        <small>
          Unofficial demo client. © 2025 —
          <a href="https://okobserver.org" target="_blank" rel="noopener">okobserver.org</a>
        </small>
      </div>
    </footer>

    <!-- Your app entry (keep your existing module files/paths) -->
    <script type="module" src="./main.js?v=2.5.8"></script>
  </body>
</html>
