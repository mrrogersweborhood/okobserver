<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Oklahoma Observer</title>

  <!-- Favicon + touch icons (all from repo root) -->
  <link rel="icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <!-- App CSS (cache-busted). If this 404s you’ll still get the inline critical CSS below. -->
  <link rel="stylesheet" href="app.css?v=2.5.9" />

  <!-- Critical safety net so things don’t blow up if app.css is missing -->
  <style>
    :root{--brand:#1e88ff;--bg:#f6f7fb;--text:#1e1e1e}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#fff;color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    header{background:#1788ea;color:#fff}
    .topbar{max-width:1100px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;gap:16px}
    .brand{display:flex;flex-direction:column}
    .brand img{height:64px;display:block}
    .motto{font-size:.95rem;opacity:.95;margin-top:6px}
    nav{margin-left:auto;display:flex;gap:10px}
    nav a{color:#fff;text-decoration:none;font-weight:600;padding:8px 12px;border-radius:8px;opacity:.95}
    nav a:hover{background:rgba(255,255,255,.12)}
    main#app{max-width:1100px;margin:18px auto;padding:0 16px}
    /* Fallback grid while app boots */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
    .card{background:#fff;border:1px solid #eee;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.04);overflow:hidden}
    .thumb-wrap{aspect-ratio:16/9;overflow:hidden;background:#fafafa}
    .thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block}
    .card-body{padding:14px}
    .card h2{font-size:1.15rem;line-height:1.25;margin:0 0 8px}
    .card h2 a{color:#0b63c1;text-decoration:none}
    .card h2 a:hover{text-decoration:underline}
    .meta{font-size:.9rem;color:#555;margin-bottom:8px}
    .excerpt{font-size:.98rem;line-height:1.45;color:#2a2a2a}
    /* Keep feature images on detail page contained if app.css misses */
    .feature{max-width:1100px;margin:18px auto;padding:0 16px}
    .feature img{width:100%;height:auto;border-radius:12px;display:block}
  </style>
</head>
<body>

  <header>
    <div class="topbar">
      <!-- Logo from repo root; 404-proof name you provided -->
      <img src="ObserverLogoBlue.png" alt="The Oklahoma Observer" height="64" />
      <div class="brand">
        <strong style="font-size:1.85rem;line-height:1">The Oklahoma Observer</strong>
        <div class="motto">To Comfort The Afflicted And Afflict The Comfortable</div>
      </div>
      <nav>
        <a href="#/">Posts</a>
        <a href="#/about">About</a>
      </nav>
    </div>
  </header>

  <!-- SPA mount point; DON’T rename this id -->
  <main id="app">
    <!-- Fallback content while JS loads; gets replaced by the app -->
    <section aria-label="Latest Posts">
      <h1 style="margin:10px 0 14px">Latest Posts</h1>
      <div class="grid" id="fallback-grid" hidden>
        <!-- Optional: you can leave empty; app will replace. Kept for structure. -->
      </div>
    </section>
  </main>

  <!-- Lock the API base early (same as before) -->
  <script>
    window.OKO = window.OKO || {};
    // You told me this Cloudflare Worker base is correct:
    OKO.API_BASE = "https://okobserver-proxy.bob-b5c.workers.dev/wp/v2";
  </script>

  <!-- App entry (cache-busted). Must be type=module for imports to work. -->
  <script type="module" src="main.js?v=2.5.9"></script>

  <!-- No-JS note -->
  <noscript>
    <div style="max-width:1100px;margin:24px auto;padding:0 16px;color:#a00">
      JavaScript is required to load posts. Please enable JavaScript and reload.
    </div>
  </noscript>
</body>
</html>
