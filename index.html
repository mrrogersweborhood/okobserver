<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OkObserver</title>
  <link rel="icon" href="Observer-Logo-2015-08-05.png" type="image/png">
  <style>
    :root {
      --brand: #1E90FF;
      --text: #222;
      --bg: #fff;
      --border: #e5e5e5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100%;
      scroll-behavior: smooth;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--brand);
      color: white;
      text-align: center;
      padding: 1rem 0.5rem 0.25rem;
      box-shadow: 0 2px 5px rgba(0,0,0,.1);
    }
    header img.logo { width: 200px; height: auto; display: block; margin: 0.25rem auto; }
    header .motto { font-size: 0.9rem; font-style: italic; color: #e8f0ff; margin-top: 0.25rem; }

    nav {
      display: flex; justify-content: center; gap: 1.25rem;
      margin-top: 0.5rem; padding-bottom: 0.75rem;
    }
    nav a { color: white; text-decoration: none; font-weight: 600; transition: opacity .2s ease; }
    nav a:hover { opacity: 0.8; }

    main { max-width: 1200px; margin: 1.5rem auto; padding: 0 1rem; }

    /* === Post grid and cards (summary page) === */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      align-items: start;
      justify-content: center;
      margin: 0 auto;
      padding: 1rem;
      max-width: 1200px;
    }
    .card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 10px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
      padding: 1rem 1.25rem 1.25rem;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 3px 6px rgba(0,0,0,.06); }

    /* clickable image on summary cards */
    .thumb-link {
      display: block;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }
    .thumb-wrap {
      width: 100%;
      overflow: hidden;
      background: #fafafa;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .thumb-wrap img.thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      border: 0;
      display: block;
      transition: filter .2s ease;
    }
    .thumb-link:hover img.thumb { filter: brightness(0.9); }

    .card h2.title { font-size: 1.1rem; margin-bottom: 0.25rem; line-height: 1.3; }
    .card h2.title a { color: var(--brand); text-decoration: none; font-weight: 600; }
    .card h2.title a:hover { text-decoration: underline; }

    .meta { font-size: 0.9rem; color: #666; margin-bottom: 0.5rem; }

    .card .excerpt {
      margin-top: 0.6rem; line-height: 1.55; color: #333;
      padding-left: 0.25rem; padding-right: 0.25rem;
    }

    /* === Detail page (comfortable frame + NO CROPPING for hero) === */
    .post-wrap { max-width: 860px; margin: 0 auto; padding: 0 1rem; }
    .post {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
      padding: 1.25rem 1.25rem 1.5rem;
    }
    .back-row { margin: 0 0 0.75rem 0; }
    .back-btn {
      display: inline-block; padding: 0.5rem 1rem; background: var(--brand);
      color: white; border-radius: 6px; text-decoration: none; font-weight: 600; transition: background .2s ease;
    }
    .back-btn:hover { background: #1874d1; }

    .post-title {
      color: var(--brand);
      margin: 0.25rem 0 0.35rem 0;
      line-height: 1.3;
      font-size: clamp(1.4rem, 2.4vw, 2rem);
    }
    .post .meta { color: #666; font-size: 0.95rem; margin-bottom: 0.9rem; }

    /* HERO — no cropping: natural aspect, full width */
    .hero-wrap {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: #f8f8f8;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-wrap .hero {
      width: 100%;
      height: auto;
      object-fit: contain; /* keep entire image visible */
      display: block;
      border: 0;
      transition: filter 0.2s ease;
    }
    .hero-wrap .hero.is-clickable { cursor: pointer; }
    .hero-wrap .hero.is-clickable:hover { filter: brightness(0.9); }

    .post-content { line-height: 1.65; font-size: 1rem; color: #222; }
    .post-content p:first-of-type { text-indent: 0 !important; margin-top: 0; }
    .post-content img, .post-content iframe {
      max-width: 100%; height: auto; display: block; margin: 1rem auto; border-radius: 8px;
    }
    .post-content a { color: var(--brand); text-decoration: underline; }

    footer { text-align: center; color: #666; font-size: 0.9rem; padding: 2rem 0; }

    @media (max-width: 600px) {
      header img.logo { width: 160px; }
      .grid { gap: 1rem; padding: 0.5rem; }
      .card { padding: 0.75rem; }
      .post { padding: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <img class="logo" src="Observer-Logo-2015-08-05.png" alt="The Oklahoma Observer">
    <div class="motto">To Comfort The Afflicted And Afflict The Comfortable</div>
    <nav>
      <a href="#/">Posts</a>
      <a href="#/about">About</a>
    </nav>
  </header>

  <main id="app">
    <div class="loading">Loading…</div>
  </main>

  <footer>
    Unofficial demo client. © 2025 — v2.5.6
  </footer>

  <script type="module" src="main.js?v=2.5.6"></script>
</body>
</html>
