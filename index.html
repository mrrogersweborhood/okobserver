<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The Oklahoma Observer – To Comfort the Afflicted and Afflict the Comfortable" />
  <title>The Oklahoma Observer</title>
  <link rel="icon" href="./icon.png" />

  <!-- Inline essential styles for layout, fallback, and spinner -->
  <style>
    :root {
      --brand: #1E90FF;
      --text-dark: #111;
      --text-light: #fff;
      --max-width: 1200px;
      --card-bg: #fff;
      --border: #ddd;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, sans-serif;
      color: var(--text-dark);
      background: #fafafa;
    }

    /* Header */
    header.header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--brand);
      color: var(--text-light);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }

    .header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
    }

    .logo-link img.logo { height: 60px; width: auto; }

    .nav { display: flex; gap: 1.25rem; }
    .nav-link {
      color: var(--text-light);
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      transition: opacity 0.2s;
    }
    .nav-link:hover { opacity: 0.8; }

    /* Main + grid */
    main#app {
      max-width: var(--max-width);
      margin: 1.5rem auto;
      padding: 0 1rem;
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 1rem;
      border-bottom: 2px solid var(--brand);
      padding-bottom: 0.25rem;
      align-self: flex-start;
      width: 100%;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      width: 100%;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 4px 14px rgba(0,0,0,.12); }

    .thumb-wrap { width: 100%; display: block; aspect-ratio: 16 / 9; overflow: hidden; }
    .thumb { width: 100%; height: 100%; object-fit: cover; display: block; }

    .card-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; }
    .title a { color: var(--text-dark); font-weight: 600; text-decoration: none; }
    .title a:hover { color: var(--brand); }
    .meta { color: #555; font-size: 0.9rem; margin: 0.25rem 0 0.5rem; }
    .excerpt { flex: 1; font-size: 0.95rem; line-height: 1.4; }

    /* Footer */
    footer.footer {
      text-align: center;
      padding: 1.5rem;
      color: #777;
      font-size: 0.9rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }

    /* Spinner */
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--brand);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 1s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 600px) {
      .logo-link img.logo { height: 48px; }
      .nav-link { font-size: 0.95rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>

  <!-- External styles -->
  <link rel="stylesheet" href="./app.css" />
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./detail.css" />
</head>

<body>
  <header id="header" class="header">
    <div class="header-inner">
      <a href="#/" class="logo-link">
        <img src="./ObserverLogoBlue.png" alt="The Oklahoma Observer logo" class="logo" />
      </a>
      <nav class="nav">
        <a href="#/" class="nav-link">Posts</a>
        <a href="#/about" class="nav-link">About</a>
      </nav>
    </div>
  </header>

  <main id="app">
    <div class="spinner"></div>
    <p>Loading...</p>
  </main>

  <footer id="footer" class="footer">
    <p>© <span id="year"></span> The Oklahoma Observer. All Rights Reserved.</p>
  </footer>

  <!-- Correct WordPress REST root via Cloudflare Worker proxy -->
  <script>
    window.OKO_API_BASE = "https://okobserver-proxy.bob-b5c.workers.dev/wp-json/wp/v2";
  </script>

  <!-- Main entry (router + app logic) -->
  <script type="module" src="./main.js"></script>
</body>
</html>
