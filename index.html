<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OkObserver</title>
  <meta name="description" content="The Oklahoma Observer - To comfort the afflicted and afflict the comfortable." />

  <!-- performance preconnects (safe, additive) -->
  <link rel="preconnect" href="https://okobserver-proxy.bob-b5c.workers.dev" crossorigin>
  <link rel="dns-prefetch" href="https://okobserver-proxy.bob-b5c.workers.dev">
  <meta http-equiv="x-dns-prefetch-control" content="on">
  <meta name="color-scheme" content="light">

  <!-- ✅ Real favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=2025-10-15a" />

  <!-- app styles (your order preserved) -->
  <link rel="stylesheet" href="styles.css?v=2025-10-15a">
  <link rel="stylesheet" href="app.css?v=2025-10-15a">
  <link rel="stylesheet" href="detail.css?v=2025-10-15a">
  <link rel="stylesheet" href="override.css?v=2025-10-15a">

  <!-- guard styles that were working for you -->
  <style>
    /* Keep header above scrolling content */
    header { position: sticky; top: 0; z-index: 10; }

    /* Ensure grid remains multi-column on wide screens */
    #ok-grid, .ok-grid {
      display: grid !important;
      gap: 14px !important;
      grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
      align-items: start;
    }
    @media (max-width: 1200px) { #ok-grid, .ok-grid { grid-template-columns: repeat(3, minmax(0,1fr)) !important; } }
    @media (max-width: 900px)  { #ok-grid, .ok-grid { grid-template-columns: repeat(2, minmax(0,1fr)) !important; } }
    @media (max-width: 640px)  { #ok-grid, .ok-grid { grid-template-columns: 1fr !important; } }

    /* Kill blue background boxes on titles anywhere */
    :where(.post-title){ background:transparent !important; }

    /* Detail title + byline under title, no right-justify */
    :where(.post-detail) :where(.post-header){
      display:block !important;background:transparent !important;border:0 !important;box-shadow:none !important;
      padding:0 !important;margin:0 0 1rem 0 !important;
    }
    :where(.post-detail) :where(.post-header) :where(h1.post-title, h1, .post-title){
      background:transparent !important;background-image:none !important;
      box-shadow:none !important;border:0 !important;outline:0 !important;
      padding:0 !important;margin:.6rem 0 .25rem 0 !important;color:#111 !important;
      text-align:left !important;line-height:1.2 !important;font-weight:800 !important;
    }
    :where(.post-detail) :where(.post-header) :where(.post-meta, .byline, .meta, .meta-inline){
      display:block !important;margin:.25rem 0 .9rem 0 !important;
      color:#666 !important;background:transparent !important;padding:0 !important;border:0 !important;
      text-align:left !important;
    }
    :where(.post-detail) :where(.oko-actions-top, .oko-actions-bottom) a,
    :where(.post-detail) :where(.oko-actions-top, .oko-actions-bottom) button,
    :where(.post-detail) .oko-btn-back{
      display:inline-block !important;
      padding:8px 12px !important;border-radius:999px !important;background:#1e63ff !important;color:#fff !important;
      text-decoration:none !important;font-weight:600 !important;
      box-shadow:0 2px 6px rgba(0,0,0,.15) !important;
    }

    /* Keep content media responsive */
    :where(.post-detail) :where(.post-content) img{
      max-width:100%;height:auto;border-radius:10px;margin:1rem 0;
    }
    :where(.post-detail) :where(.post-content) iframe{
      width:100% !important;max-width:100% !important;aspect-ratio:16/9 !important;border:0 !important;border-radius:10px;
    }

    /* Poster play overlay (if present) */
    :where(.oko-video-poster){ position:relative; display:block; border-radius:10px; overflow:hidden; cursor:pointer; }
    :where(.oko-video-poster) img{ display:block; width:100%; height:auto; }
    :where(.oko-video-play){
      position:absolute; inset:0; display:grid; place-items:center; pointer-events:none;
    }
    :where(.oko-video-play)::before{
      content:""; width:72px; height:72px; border-radius:999px; background:rgba(0,0,0,.35); box-shadow:0 4px 18px rgba(0,0,0,.35);
    }
    :where(.oko-video-play)::after{
      content:""; margin-left:4px; border-style:solid; border-width:14px 0 14px 22px; border-color:transparent transparent transparent #fff;
    }
  </style>
</head>
<body>
  <header class="oko-header">
    <div class="brand">
      <img src="ObserverLogoBlue.png" alt="" style="height:28px;vertical-align:middle;margin-right:8px;">
      <strong>OkObserver</strong>
    </div>
    <nav class="oko-nav">
      <a href="#/">Posts</a>
      <a href="#/about">About</a>
    </nav>
  </header>

  <main>
    <!-- App mount point -->
    <div id="app"></div>
  </main>

  <footer>
    © 2025 The Oklahoma Observer • All Rights Reserved.
  </footer>

  <!-- ✅ Cache-busted main entry -->
  <script type="module" src="main.js?v=2025-10-116g"></script>
</body>
</html>
