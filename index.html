<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Oklahoma Observer</title>
  <meta name="description" content="The Oklahoma Observer – Comforting the afflicted and afflicting the comfortable since 1969." />

  <!-- Styles (cache-busted) -->
  <link rel="stylesheet" href="./styles.css?v=265c" />
  <link rel="stylesheet" href="./override.css?v=265c" />

  <!-- Icon -->
  <link rel="icon" type="image/png" href="./icon.png" />
</head>

<body>
  <header id="site-header">
    <div class="brand">
      <img src="./ObserverLogoBlue.png" alt="The Oklahoma Observer" />
    </div>
    <nav class="site-nav">
      <a href="#/">Posts</a>
      <a href="#/about">About</a>
    </nav>
  </header>

  <main id="app">
    <p style="text-align:center; margin:2rem 0;">Loading...</p>
  </main>

  <footer id="site-footer">
    © <span id="year"></span> The Oklahoma Observer. All Rights Reserved.
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

  <!-- App modules (cache-busted, NO filename changes) -->
  <script type="module" src="./core-fixed.js?v=265"></script>
  <script type="module" src="./home.js?v=265"></script>
  <script type="module" src="./about.js?v=265"></script>
  <script type="module" src="./detail.v263.js?v=265"></script>
  <script type="module" src="./main.js?v=265"></script>

  <!-- Scroll memory helper (if you’re using it) -->
  <script src="./scroll-restore.js?v=265"></script>

  <!-- Cleanup for empty WP blocks (prevents gray boxes) -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const selectors = [
        '.mceTemp',
        'div.mceTemp',
        '.wp-block:empty',
        'figure:empty',
        '.wp-block-image:empty',
        '.wp-block-video:empty',
        '.wp-block-embed__wrapper:empty',
        '.wp-block-embed:has(> iframe[src=""])',
        '.wp-block-embed:has(> a[href=""])',
        '.wp-block-embed[style*="padding-bottom:56.25%"]:empty'
      ];
      selectors.forEach(sel => {
        document.querySelectorAll(sel).forEach(el => el.remove());
      });
    });
  </script>

  <!-- Minimal Service Worker registration (cache-busted) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js?v=265');
      });
    }
  </script>
</body>
</html>
