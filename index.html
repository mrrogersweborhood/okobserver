<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Oklahoma Observer</title>

  <!-- Your primary stylesheet (existing) -->
  <link rel="stylesheet" href="./styles.css?v=patch1" />

  <!-- NEW: surgical overrides kept separate so they won't be lost -->
  <link rel="stylesheet" href="./override.css?v=1" />

  <link rel="icon" href="./icon.png" type="image/png" />
</head>
<body>
  <header id="site-header">
    <div class="brand">
      <img src="./ObserverLogoBlue.png" alt="The Oklahoma Observer" />
    </div>
    <nav class="site-nav">
      <a href="#/">Posts</a>
      <a href="#/about">About</a>
    </nav>
  </header>

  <main id="app">
    <p style="text-align:center; margin:2rem 0;">Loading...</p>
  </main>

  <footer id="site-footer">
    © <span id="year"></span> The Oklahoma Observer. All Rights Reserved.
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

  <!-- Keep your current versioned entry point -->
  <script type="module" src="./main.js?v=2.6.4"></script>

  <!-- Optional but safe scroll memory helper (only if you kept it) -->
  <script src="./scroll-restore.js?v=1"></script>
<script>
/**
 * OkObserver — WordPress Empty Block Cleanup
 * Removes leftover empty DIVs, figures, or embed wrappers (gray boxes)
 */
document.addEventListener('DOMContentLoaded', () => {
  const selectors = [
    '.mceTemp',
    'div.mceTemp',
    '.wp-block:empty',
    'figure:empty',
    '.wp-block-image:empty',
    '.wp-block-video:empty',
    '.wp-block-embed__wrapper:empty',
    '.wp-block-embed:has(> iframe[src=""])',
    '.wp-block-embed:has(> a[href=""])',
    '.wp-block-embed[style*="padding-bottom:56.25%"]:empty'
  ];

  selectors.forEach(sel => {
    document.querySelectorAll(sel).forEach(el => {
      el.remove();
    });
  });
});
</script>
</body>
</html>
