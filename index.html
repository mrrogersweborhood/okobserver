<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OkObserver</title>
  <link rel="stylesheet" href="app.css" />

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #f7f9fc;
    }
    header {
      background: #1e63ff;
      color: #fff;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    nav a {
      color: #fff;
      margin-left: 1rem;
      text-decoration: none;
      font-weight: 600;
    }
    main {
      padding: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    footer {
      text-align: center;
      padding: 1rem;
      color: #555;
      font-size: 0.85rem;
    }
  </style>

  <!-- 🔧 Permanent Fix for 4-column grid & Title cleanup -->
  <style id="oko-hotfix-v1">
    /* --- Force 4-up grid on the posts summary --- */
    .posts-grid {
      display: grid !important;
      grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
      gap: 22px !important;
      align-items: start !important;
    }
    /* tablet */
    @media (max-width: 1200px) {
      .posts-grid { grid-template-columns: repeat(3, minmax(0,1fr)) !important; }
    }
    /* big phones */
    @media (max-width: 900px) {
      .posts-grid { grid-template-columns: repeat(2, minmax(0,1fr)) !important; }
    }
    /* phones */
    @media (max-width: 560px) {
      .posts-grid { grid-template-columns: 1fr !important; }
    }

    /* Prevent rogue styles shrinking cards to 100% width */
    .post-card { width: 100% !important; max-width: none !important; }

    /* --- Remove any blue box/background from post titles on detail pages --- */
    .post-detail .post-header .post-title,
    .post-detail h1.post-title {
      background: transparent !important;
      background-image: none !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: 0 !important;
      margin: .6rem 0 .2rem 0 !important;
      color: #111 !important;
    }
    .post-detail .post-header .post-title::before,
    .post-detail .post-header .post-title::after {
      content: none !important;
      display: none !important;
    }

    /* Author/date line */
    .post-detail .post-meta {
      color: #666;
      font-size: 14px;
      margin: 0 0 .75rem 0;
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>OkObserver</h1>
      <p style="font-size:0.8rem; margin:0;">"To comfort the afflicted and afflict the comfortable."</p>
    </div>
    <nav>
      <a href="#/">Posts</a>
      <a href="#/about">About</a>
    </nav>
  </header>

  <main id="app">
    <!-- Dynamic content loads here -->
  </main>

  <footer>
    © 2025 The Oklahoma Observer • All Rights Reserved.
  </footer>

  <script type="module" src="main.js"></script>

  <!-- 🧱 Enforce layout integrity -->
  <script>
    (function enforceGridAndTitle() {
      // Lock the posts grid layout permanently
      const selector = '.posts-grid, #app .grid, main .grid, .posts .grid';
      function applyGridFix() {
        document.querySelectorAll(selector).forEach(el => {
          el.style.setProperty('display', 'grid', 'important');
          el.style.setProperty('gap', '22px', 'important');
          el.style.setProperty('align-items', 'start', 'important');
          el.style.setProperty('grid-template-columns', 'repeat(4, 1fr)', 'important');
        });
      }

      // Remove any blue box background from post titles dynamically
      function cleanTitles() {
        document.querySelectorAll('.post-detail .post-title').forEach(t => {
          t.style.background = 'transparent';
          t.style.border = 'none';
          t.style.boxShadow = 'none';
        });
      }

      applyGridFix();
      cleanTitles();
      document.addEventListener('DOMContentLoaded', () => {
        applyGridFix();
        cleanTitles();
      });

      new MutationObserver(() => {
        applyGridFix();
        cleanTitles();
      }).observe(document.documentElement, { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
