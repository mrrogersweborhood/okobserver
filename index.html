<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OkObserver</title>
  <link rel="stylesheet" href="app.css" />

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #f7f9fc;
    }
    header {
      background: #1e63ff;
      color: #fff;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    nav a {
      color: #fff;
      margin-left: 1rem;
      text-decoration: none;
      font-weight: 600;
    }
    main {
      padding: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    footer {
      text-align: center;
      padding: 1rem;
      color: #555;
      font-size: 0.85rem;
    }
  </style>

  <!-- Permanent Fix for 4-column grid & Title cleanup -->
  <style id="oko-hotfix-v1">
    /* Force 4-up grid with responsive fallbacks */
    #app .posts-grid,
    #app .posts-list,
    #app .posts,
    #app .cards,
    #app .list,
    #app > .grid {
      display: grid !important;
      grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
      gap: 22px !important;
      align-items: start !important;
    }
    @media (max-width: 1200px){
      #app .posts-grid, #app .posts-list, #app .posts, #app .cards, #app .list, #app > .grid {
        grid-template-columns: repeat(3, minmax(0,1fr)) !important;
      }
    }
    @media (max-width: 900px){
      #app .posts-grid, #app .posts-list, #app .posts, #app .cards, #app .list, #app > .grid {
        grid-template-columns: repeat(2, minmax(0,1fr)) !important;
      }
    }
    @media (max-width: 560px){
      #app .posts-grid, #app .posts-list, #app .posts, #app .cards, #app .list, #app > .grid {
        grid-template-columns: 1fr !important;
      }
    }

    /* Card layout sanity */
    .post-card { width: 100% !important; max-width: none !important; }
    .post-card img { width: 100% !important; height: auto !important; display: block; }

    /* Remove any blue box from post titles (detail page) */
    .post-detail .post-header .post-title,
    .post-detail h1.post-title {
      background: transparent !important;
      background-image: none !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: 0 !important;
      margin: .6rem 0 .2rem 0 !important;
      color: #111 !important;
    }
    .post-detail .post-header .post-title::before,
    .post-detail .post-header .post-title::after {
      content: none !important;
      display: none !important;
    }

    /* Author/date display */
    .post-detail .post-meta {
      color: #666;
      font-size: 14px;
      margin: 0 0 .75rem 0;
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>OkObserver</h1>
      <p style="font-size:0.8rem; margin:0;">"To comfort the afflicted and afflict the comfortable."</p>
    </div>
    <nav>
      <a href="#/">Posts</a>
      <a href="#/about">About</a>
    </nav>
  </header>

  <main id="app">
    <!-- Content dynamically injected here -->
  </main>

  <footer>
    © 2025 The Oklahoma Observer • All Rights Reserved.
  </footer>

  <script type="module" src="main.js"></script>

  <!-- Enforce grid and cleanup dynamically -->
  <script>
    (function gridEnforcer(){
      const APP = document.getElementById('app');

      function makeGrid() {
        let container =
          APP.querySelector('.posts-grid') ||
          APP.querySelector('.posts-list') ||
          APP.querySelector('.posts') ||
          APP.querySelector('.cards') ||
          APP.querySelector('.list') ||
          [...APP.children].find(el => el.querySelectorAll('.post-card').length > 1);

        const cards = APP.querySelectorAll('.post-card');
        if (container && cards.length > 1) {
          container.style.setProperty('display', 'grid', 'important');
          container.style.setProperty('gap', '22px', 'important');
          container.style.setProperty('align-items', 'start', 'important');
          container.style.setProperty('grid-template-columns', 'repeat(4, 1fr)', 'important');

          cards.forEach(c => {
            c.style.setProperty('width', '100%', 'important');
            c.style.setProperty('max-width', 'none', 'important');
          });
        }
      }

      function cleanTitles() {
        document.querySelectorAll('.post-detail .post-title').forEach(t => {
          t.style.background = 'transparent';
          t.style.border = 'none';
          t.style.boxShadow = 'none';
        });
      }

      makeGrid();
      cleanTitles();
      new MutationObserver(() => {
        makeGrid();
        cleanTitles();
      }).observe(APP, { childList: true, subtree: true });
      window.addEventListener('hashchange', () => setTimeout(makeGrid, 0));
      document.addEventListener('DOMContentLoaded', makeGrid);
    })();
  </script>
</body>
</html>
