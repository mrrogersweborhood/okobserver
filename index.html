<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The Oklahoma Observer – To Comfort The Afflicted And Afflict The Comfortable" />
  <title>The Oklahoma Observer</title>
  <link rel="icon" type="image/png" href="./icon.png" />
  <link rel="stylesheet" href="./styles.css" />
  <style>
    :root { --brand:#1E90FF; --background:#ffffff; --text:#111; --muted:#666; --border:#e0e0e0; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin:0; background:var(--background); color:var(--text); display:flex; flex-direction:column; min-height:100vh; }
    header { background: var(--brand); color:white; padding:.75rem 1rem; position:sticky; top:0; z-index:1000; }
    .header-inner { display:flex; align-items:center; justify-content:space-between; max-width:1200px; margin:0 auto; }
    .logo { height:50px; object-fit:contain; }
    nav { display:flex; gap:1rem; }
    .nav-link { color:white; text-decoration:none; font-weight:500; font-size:1rem; }
    .nav-link:hover { text-decoration:underline; }
    main { flex:1; padding:2rem 1rem; max-width:1200px; margin:0 auto; width:100%; box-sizing:border-box; }
    .loading { text-align:center; padding:4rem; font-size:1.2rem; color:var(--muted); }
    footer { border-top:1px solid var(--border); text-align:center; padding:1rem; font-size:.9rem; color:var(--muted); background:#fafafa; }
    @media (max-width:600px){ .header-inner{flex-direction:column;} nav{margin-top:.5rem;} }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <img src="./ObserverLogoBlue.png" alt="The Oklahoma Observer" class="logo" />
      <nav>
        <a href="#/" class="nav-link">Posts</a>
        <a href="#/about" class="nav-link">About</a>
      </nav>
    </div>
  </header>
  <main id="app"><div class="loading">Loading…</div></main>
  <footer><p>© <span id="year"></span> The Oklahoma Observer. All Rights Reserved.</p></footer>
  <script type="module" src="./main.js?v=2.6.3"></script>
</body>
</html>
