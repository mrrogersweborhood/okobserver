<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OkObserver — Posts</title>
  <style>
    :root{--primary:#ffffff;--secondary:#1E90FF;--header-h:64px}
    body {margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--primary);color:#111}
    header {position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--secondary);color:white}
    #header-spacer{height:var(--header-h)}

    .container{max-width:1100px;margin:0 auto;padding:18px}
    .container.nav {display:flex;align-items:center;gap:14px;padding:10px 18px}
    .brand {display:flex;flex-direction:column;align-items:flex-start;gap:6px;min-width:0}
    .brand .row {display:flex;align-items:center;gap:12px;min-width:0}
    .brand img {height:40px;width:auto;display:block}
    .brand .motto {font-size:0.9em;line-height:1.2}

    nav {margin-left:auto;display:flex;gap:10px}
    nav a {display:flex;align-items:center;height:40px;color:white;text-decoration:none;padding:6px 10px;font-weight:500;border-radius:6px}
    nav a:hover {background:rgba(255,255,255,0.2)}

    main {padding:20px}
    footer {background:#f3f3f3;font-size:.85em}
    .center {text-align:center}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
    .card{border:1px solid #ddd;border-radius:10px;background:#fff;overflow:hidden;display:flex;flex-direction:column}
    .thumb{width:100%;height:160px;object-fit:cover;background:#f0f0f0;cursor:pointer}
    .card-body{padding:12px;display:flex;flex-direction:column;gap:6px}
    .title{font-size:1.1em;margin:4px 0;color:var(--secondary)}
    .meta-author-date{font-size:.85em;color:var(--secondary);display:flex;gap:8px;align-items:center;margin-bottom:4px}
    .excerpt{font-size:.9em;color:#333}
    .btn{display:inline-block;padding:6px 12px;border:none;border-radius:6px;background:var(--secondary);color:#fff;text-decoration:none;cursor:pointer;font-size:.9em}
    .btn[disabled]{opacity:.6;cursor:not-allowed}
    .btn:hover:not([disabled]){background:#0066cc}
    .post h1{margin-top:0;color:var(--secondary)}
    .post .meta-author-date{font-size:.9em;color:var(--secondary);margin-bottom:8px;display:flex;gap:8px;align-items:center}
    .post .hero{display:block;width:100%;height:auto;object-fit:contain;margin:16px 0;border-radius:10px}

    /* Fix centered text from WP */
    .post .content,.post .content p,.post .content div,.post .content li,.post .content h1,.post .content h2,.post .content h3,.post .content h4{text-align:left!important;}
    .post .content img{display:block!important;margin:16px auto!important;float:none!important;clear:both!important;}
    .post .content .has-text-align-center,
    .post .content .has-text-align-right,
    .post .content .aligncenter,
    .post .content .alignright,
    .post .content [align="center"],
    .post .content [align="right"]{text-align:left!important;}
    .post .content .has-text-align-center *,.post .content .has-text-align-right *,.post .content .aligncenter *,.post .content .alignright *{text-align:left!important;}

    .tags{margin-top:12px;font-size:.85em}
    .tag-chip{display:inline-block;background:var(--secondary);color:#fff;padding:3px 8px;margin:0 6px 6px 0;border-radius:12px;font-size:.8em;text-decoration:none}
    .error-banner{background:#ffdddd;color:#900;padding:10px;border:1px solid #f99;border-radius:6px;margin:10px 0;position:relative}
    .error-banner .close{position:absolute;top:6px;right:8px;background:none;border:none;font-size:16px;line-height:1;cursor:pointer;color:#900}
    .error-banner .close:hover{opacity:.8}

    html,body {max-width:100%;overflow-x:hidden;}
    *,*::before,*::after{box-sizing:border-box;}
  </style>
</head>
<body>
  <header id="site-header">
    <div class="container nav">
      <div class="brand">
        <div class="row">
          <img src="https://okobserver.org/wp-content/uploads/2015/09/Observer-Logo-2015-08-05.png" alt="The Oklahoma Observer logo" />
        </div>
        <div class="motto">To Comfort The Afflicted And Afflict The Comfortable</div>
      </div>
      <nav>
        <a href="#/" id="nav-home">Home</a>
        <a href="#/about" id="nav-about">About</a>
      </nav>
    </div>
  </header>
  <div id="header-spacer" aria-hidden="true"></div>

  <main>
    <div class="container" id="app"><p class="center">Loading…</p></div>
  </main>

  <footer>
    <div class="container" style="display:flex;gap:10px;align-items:center;justify-content:space-between;padding:16px 18px">
      <small>Unofficial demo client. © <span id="year"></span> — <span id="appVersion"></span></small>
      <small><a href="https://okobserver.org" target="_blank" rel="noopener">okobserver.org</a></small>
    </div>
  </footer>

  <script>
    (function(){
      function sizeHeader(){
        var h=document.getElementById('site-header');
        var s=document.getElementById('header-spacer');
        if(!h||!s)return;
        var hh=Math.ceil(h.getBoundingClientRect().height);
        document.documentElement.style.setProperty('--header-h',hh+'px');
        s.style.height='var(--header-h)';
      }
      window.addEventListener('load',sizeHeader,{once:true});
      window.addEventListener('resize',sizeHeader);
      setTimeout(sizeHeader,100);setTimeout(sizeHeader,400);
    })();
  </script>

  <script src="app.js?v=1.46.0" defer></script>
</body>
</html>
