<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Observer</title>

    <!-- Optional: add a tiny inline favicon to stop the favicon 404 -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='8' fill='%23006aff'/%3E%3C/svg%3E" />

    <style>
      /* keep header + container basics; doesn’t touch your page modules */
      :root { color-scheme: light; }
      html, body { margin:0; padding:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, 'Helvetica Neue', Arial, 'Noto Sans', 'Apple Color Emoji', 'Segoe UI Emoji'; background:#fff; color:#111; }
      .site-header { background:#165DFF; color:#fff; }
      .site-header .wrap { max-width:1200px; margin:0 auto; padding:18px 16px; }
      .site-title { font-size:28px; font-weight:800; margin:0 0 6px; }
      .site-motto { font-size:14px; opacity:.9; margin:0; }
      .nav { display:flex; gap:18px; padding:10px 16px; background:rgba(255,255,255,.08); }
      .nav a { color:#fff; text-decoration:none; font-weight:600; }
      .nav a:hover { text-decoration:underline; }
      .app { max-width:1200px; margin:0 auto; padding:16px; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <div class="site-title">Observer</div>
        <p class="site-motto">“To comfort the afflicted and afflict the comfortable.”</p>
      </div>
      <nav class="nav">
        <a href="#/">Posts</a>
        <a href="#/about">About</a>
      </nav>
    </header>

    <main id="app" class="app">
      <!-- app renders here -->
    </main>

    <!-- Boot the app; no utils included -->
    <script type="module" src="./main.js?v=265"></script>
  </body>
</html>
