<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OkObserver</title>
  <meta name="description" content="The Oklahoma Observer - To comfort the afflicted and afflict the comfortable.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>">

  <style>
    :root {
      --brand: #1E63FF;
      --light-bg: #f5f7fb;
      --text-dark: #111;
      --border: #ddd;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--light-bg);
      color: var(--text-dark);
    }

    header {
      background: var(--brand);
      color: #fff;
      padding: 0.6rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin: 0;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin-left: 1.2rem;
      font-weight: 500;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      padding: 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    h2 {
      margin-top: 0;
    }

    footer {
      text-align: center;
      font-size: 0.9rem;
      color: #777;
      padding: 1rem 0;
      border-top: 1px solid var(--border);
      background: #fff;
    }
  </style>

  <!-- 🔒 Permanent 4-column grid and card styling -->
  <style id="oko-guards">
    #app .posts-grid,
    #app .posts-list,
    #app .posts,
    #app .cards,
    #app .list,
    #app > .grid {
      display: grid !important;
      grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
      gap: 28px !important;
      align-items: start !important;
      justify-items: stretch !important;
      margin-top: 1rem !important;
    }

    @media (max-width: 1200px) {
      #app .posts-grid, #app .posts-list, #app .posts, #app .cards, #app .list, #app > .grid {
        grid-template-columns: repeat(3, minmax(0,1fr)) !important;
      }
    }
    @media (max-width: 900px) {
      #app .posts-grid, #app .posts-list, #app .posts, #app .cards, #app .list, #app > .grid {
        grid-template-columns: repeat(2, minmax(0,1fr)) !important;
      }
    }
    @media (max-width: 560px) {
      #app .posts-grid, #app .posts-list, #app .posts, #app .cards, #app .list, #app > .grid {
        grid-template-columns: 1fr !important;
      }
    }

    .post-card {
      width: 100% !important;
      max-width: none !important;
      display: block;
      background: #fff !important;
      border-radius: 10px !important;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08) !important;
      overflow: hidden;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .post-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    }

    .post-card img {
      width: 100% !important;
      height: auto !important;
      display: block;
      border-bottom: 1px solid #eee;
    }

    .post-card h3 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0.7rem 0.8rem;
      color: var(--brand);
    }

    .post-card p {
      margin: 0 0.8rem 1rem 0.8rem;
      color: #333;
      line-height: 1.4;
    }

    .post-card a {
      text-decoration: none;
      color: inherit;
    }

    /* Remove unwanted title backgrounds from detail pages */
    .post-detail .post-title {
      background: transparent !important;
      box-shadow: none !important;
      border: none !important;
    }
  </style>
</head>

<body>
  <header>
    <h1>OkObserver</h1>
    <nav>
      <a href="#/">Posts</a>
      <a href="#/about">About</a>
    </nav>
  </header>

  <main>
    <div id="app">
      <h2>Latest Posts</h2>
      <p>Loading…</p>
    </div>
  </main>

  <footer>
    © 2025 The Oklahoma Observer • All Rights Reserved.
  </footer>

  <!-- Load main app -->
  <script type="module" src="main.js"></script>
</body>
</html>
