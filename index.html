<!doctype html>
<html lang="en">
  <head>
    <!-- Core meta -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1e63ff" />
    <meta name="color-scheme" content="light dark" />

    <!-- SEO / Social -->
    <title>OkObserver</title>
    <meta name="description" content="Latest posts and commentary from The Oklahoma Observer." />
    <meta property="og:title" content="OkObserver" />
    <meta property="og:description" content="Latest posts and commentary from The Oklahoma Observer." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mrrogersweborhood.github.io/okobserver/" />
    <meta property="og:image" content="icon.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Icons -->
    <link rel="icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="icon.png" />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://okobserver-proxy.bob-b5c.workers.dev" crossorigin />
    <link rel="dns-prefetch" href="https://okobserver-proxy.bob-b5c.workers.dev" />

    <!-- Styles (base → feature → overrides; overrides LAST) -->
    <link rel="stylesheet" href="app.css?v=2025-10-18c" />
    <link rel="stylesheet" href="detail.css?v=2025-10-18c" />
    <link rel="stylesheet" href="override.css?v=2025-10-18c" />

    <!-- Small safeguards -->
    <style>
      html { text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
      body { margin: 0; }
      header.oko-header { position: sticky; top: 0; z-index: 10; }
      main { padding-bottom: 56px; }
    </style>

    <!-- Preload entry (optional) -->
    <link rel="modulepreload" href="main.js?v=2025-10-18c" />
  </head>

  <body>
    <!-- Header / Nav (keep brand + links intact) -->
    <header class="oko-header">
      <div class="brand">
        <img src="ObserverLogoBlue.png" alt="" style="height:28px;vertical-align:middle;margin-right:8px;">
        <strong>OkObserver</strong>
      </div>
      <nav class="oko-nav">
        <a href="#/">Posts</a>
        <a href="#/about">About</a>
      </nav>
    </header>

    <!-- App root -->
    <main>
      <div id="app" role="main"></div>
    </main>

    <!-- Footer / branding -->
    <footer>
      © 2025 The Oklahoma Observer • All Rights Reserved.
    </footer>

    <!-- No-script notice -->
    <noscript>
      <div style="max-width:920px;margin:1rem auto;padding:1rem;border-radius:10px;background:#fff3cd;color:#6b5b00">
        JavaScript is required to use this site.
      </div>
    </noscript>

    <!-- App entry (router + boot) -->
    <script type="module" src="main.js?v=2025-10-18c"></script>

    <!-- Service Worker registration (cache-bust via query) -->
    <script>
      (function registerSW(){
        if (!('serviceWorker' in navigator)) return;
        const SW_URL = 'sw.js?v=2025-10-18c';
        window.addEventListener('load', () => {
          navigator.serviceWorker.register(SW_URL).then(reg => {
            console.log('[OkObserver] SW registered', reg.scope || '');
            if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            reg.addEventListener('updatefound', () => {
              const nw = reg.installing;
              nw && nw.addEventListener('statechange', () => {
                if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('[OkObserver] SW updated; new content on next load');
                }
              });
            });
          }).catch(err => console.warn('[OkObserver] SW registration failed', err));
        });
      })();
    </script>
  </body>
</html>
