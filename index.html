<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OkObserver — Posts</title>

  <!-- Speed: warm up connections to WP + media -->
  <link rel="preconnect" href="https://okobserver.org" crossorigin>
  <link rel="dns-prefetch" href="//okobserver.org">

  <style>
    :root{--primary:#ffffff;--secondary:#1E90FF}
    body {margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--primary);color:#111}

    /* Header / Nav */
    header {background:var(--secondary);color:#fff;position:sticky;top:0;z-index:10}
    .container{max-width:1100px;margin:0 auto;padding:18px}
    .container.nav {display:flex;align-items:center;gap:14px;padding:12px 18px}
    .brand {display:flex;flex-direction:column;align-items:center;text-align:center;font-weight:600;gap:4px}
    .brand .motto {font-size:0.9em;margin-top:4px;font-style:normal}
    nav {margin-left:auto;display:flex;gap:10px}
    nav a {display:flex;align-items:center;height:40px;color:#fff;text-decoration:none;padding:6px 10px;font-weight:500;border-radius:6px}
    nav a:hover {background:rgba(255,255,255,0.2)}

    main {padding:20px}
    footer {background:#f3f3f3;font-size:.85em}

    .center {text-align:center}

    /* Cards / Grid */
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
    .card{border:1px solid #ddd;border-radius:10px;background:#fff;overflow:hidden;display:flex;flex-direction:column}
    .thumb{width:100%;height:auto;object-fit:cover;background:#f0f0f0;cursor:pointer;aspect-ratio:16/9}
    .card-body{padding:12px;display:flex;flex-direction:column;gap:6px}
    .title{font-size:1.1em;margin:4px 0;color:var(--secondary)}
    .meta-author-date{font-size:.9em;display:flex;gap:8px;align-items:center;margin-bottom:4px}
    .meta-author-date .author{color:var(--secondary);font-weight:700}
    .meta-author-date .date{color:#000;font-weight:400}
    .excerpt{font-size:.9em;color:#333}

    /* Buttons */
    .btn{display:inline-block;padding:6px 12px;border:none;border-radius:6px;background:var(--secondary);color:#fff;text-decoration:none;cursor:pointer;font-size:.9em}
    .btn[disabled]{opacity:.6;cursor:not-allowed}
    .btn:hover:not([disabled]){background:#0066cc}

    /* Post detail */
    .post h1{margin-top:0;color:var(--secondary)}
    .post .meta-author-date{font-size:.95em;margin-bottom:8px}
    .post .hero{width:100%;max-height:420px;object-fit:cover;margin:16px 0;border-radius:10px}
    .tags{margin-top:12px;font-size:.85em}
    .tag-chip{display:inline-block;background:var(--secondary);color:#fff;padding:3px 8px;margin:0 6px 6px 0;border-radius:12px;font-size:.8em;text-decoration:none}

    /* Error banner */
    .error-banner{background:#ffdddd;color:#900;padding:10px;border:1px solid #f99;border-radius:6px;margin:10px 0;position:relative}
    .error-banner .close{position:absolute;top:6px;right:8px;background:none;border:none;font-size:16px;line-height:1;cursor:pointer;color:#900}
    .error-banner .close:hover{opacity:.8}
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <div class="brand">
        <div class="motto">To Comfort The Afflicted And Afflict The Comfortable</div>
      </div>
      <nav>
        <a href="#/" id="nav-home">Home</a>
        <a href="#/about" id="nav-about">About</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container" id="app"><p class="center">Loading…</p></div>
  </main>

  <footer>
    <div class="container" style="display:flex;gap:10px;align-items:center;justify-content:space-between;padding:16px 18px">
      <small>Unofficial demo client. © <span id="year"></span> — <span id="appVersion"></span></small>
      <small><a href="https://okobserver.org" target="_blank" rel="noopener">okobserver.org</a></small>
    </div>
  </footer>

  <!-- Bump this any time you update app.js -->
  <script src="app.js?v=1.45.0" defer></script>
</body>
</html>
